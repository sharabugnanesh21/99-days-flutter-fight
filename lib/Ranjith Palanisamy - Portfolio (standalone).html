document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(30px,4.6vw,58px);font-weight:600;letter-spacing:-.02em;line-height:1.02;max-width:820px\">Apps built, shipped, and <span style=\"font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;color:#8B7CF6\">running in production.<\u002Fspan><\u002Fh2>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;flex-direction:column;gap:clamp(48px,7vw,96px)\">\n    <sc-for list=\"{{ projects }}\" as=\"project\" hint-placeholder-count=\"4\">\n      <div data-reveal=\"\" class=\"two-col\" style=\"display:grid;grid-template-columns:{{ project.cols }};gap:clamp(30px,5vw,70px);align-items:center\">\n        <!-- PHONE -->\n        <div style=\"order:{{ project.mediaOrder }};display:flex;justify-content:center\">\n          <div style=\"position:relative\">\n            <div style=\"position:absolute;inset:-40px;border-radius:60px;background:{{ project.glow }};filter:blur(50px);opacity:.55;z-index:0\"><\u002Fdiv>\n            <div style=\"position:relative;z-index:1;width:270px;height:560px;border-radius:44px;padding:11px;background:linear-gradient(160deg,#20242e,#0b0d13);box-shadow:0 40px 90px rgba(0,0,0,.6),inset 0 1px 1px rgba(255,255,255,.08);animation:floaty 7s ease-in-out infinite\">\n              <div style=\"position:absolute;top:26px;left:50%;transform:translateX(-50%);width:96px;height:26px;background:#05060A;border-radius:0 0 16px 16px;z-index:3\"><\u002Fdiv>\n              <div style=\"position:relative;width:100%;height:100%;border-radius:34px;overflow:hidden;background:#0b0d13\">\n                <image-slot id=\"{{ project.slotId }}\" shape=\"rect\" placeholder=\"{{ project.slotPlaceholder }}\"><\u002Fimage-slot>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <!-- TEXT -->\n        <div style=\"order:{{ project.textOrder }}\">\n          <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:16px\">\n            <span sty 00%&quot;,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { open: { 0: false, 1: true, 2: false } };\n\n  toggle(i){ this.setState(s => ({ open: { ...s.open, [i]: !s.open[i] } })); }\n\n  renderVals(){\n    const resumeUrl = \"assets/Ranjith-Palanisamy-Resume.pdf\";\n\n    const projects = [\n      {\n        no:\"01\", category:\"AI · Health & Wellness\", accent:\"#4EA8FF\",\n        glow:\"radial-gradient(circle,#4EA8FF,transparent 70%)\",\n        name:\"Perky Pet\", tagline:\"AI-powered pet health & wellness app\",\n        slotId:\"proj-perkypet\", slotPlaceholder:\"Drop Perky Pet screen\",\n        description:\"Built from scratch on Clean Architecture, featuring PerkyBot — an AI chat assistant with streaming responses, voice, and rich attachments.\",\n        highlights:[\n          \"PerkyBot AI chat: streaming responses, speech-to-text, text-to-speech, file attachments\",\n          \"OAuth login, JWT/Dio interceptors, Firebase Analytics & Crashlytics, OpenTelemetry\",\n          \"Maps, charts, staging/production flavors, and App Store / Play Store deployments\"\n        ],\n        stack:[\"Flutter\",\"Dart\",\"Firebase\",\"Bloc/Cubit\",\"Clean Architecture\",\"OpenTelemetry\"],\n        cols:\"1fr 1.1fr\", mediaOrder:\"1\", textOrder:\"2\"\n      },\n      {\n        no:\"02\", category:\"Retail · Commerce\", accent:\"#8B7CF6\",\n        glow:\"radial-gradient(circle,#8B7CF6,transparent 70%)\",\n        name:\"AAFES — Shop My Exchange\", tagline:\"Commerce app migration & optimization\",\n        slotId:\"proj-aafes\", slotPlaceholder:\"Drop Shop My Exchange screen\",\n        description:\"Migrated a FlutterFlow codebase to Clean Architecture, then hardened it for scale — cutting app size by more than half and improving speed significantly.\",\n        highlights:[\n          \"Migrated FlutterFlow code to Clean Architecture with GoRouter / shell routing\",\n          \"Barcode scanning, location services, Firestore analytics, adaptive UI\",\n          \"Multi-environment flavors, UAT and store releases — app size reduced by 50%+\"\n        ],\n        stack:[\"Flutter\",\"Dart\",\"CommerceTools\",\"Braze\",\"Bloc/Cubit\",\"GoRouter\"],\n        cols:\"1.1fr 1fr\", mediaOrder:\"2\", textOrder:\"1\"\n      },\n      {\n        no:\"03\", category:\"Fintech · Super App\", accent:\"#67E8F9\",\n        glow:\"radial-gradient(circle,#67E8F9,transparent 70%)\",\n        name:\"Aditya Birla Capital\", tagline:\"Super app module development\",\n        slotId:\"proj-abc\", slotPlaceholder:\"Drop Super App screen\",\n        description:\"Integrated modules into an Android / iOS / Web super app with payments, maps, and secure session handling across multiple environments.\",\n        highlights:[\n          \"Razorpay payments, Google Maps, barcode scanning, Firebase Cloud Storage zip upload\",\n          \"Session handling, responsive UI, Provider state management, GoRouter navigation\",\n          \"Performance improvements and multi-environment deployments\"\n        ],\n        stack:[\"Flutter\",\"Dart\",\"Razorpay\",\"Firebase\",\"Provider\",\"GoRouter\"],\n        cols:\"1fr 1.1fr\", mediaOrder:\"1\", textOrder:\"2\"\n      },\n      {\n        no:\"04\", category:\"Logistics · Operations\", accent:\"#4EFF9F\",\n        glow:\"radial-gradient(circle,#4EFF9F,transparent 70%)\",\n        name:\"DeLytix MGT\", tagline:\"Logistics management app\",\n        slotId:\"proj-delytix\", slotPlaceholder:\"Drop DeLytix screen\",\n        description:\"Developed from scratch for logistics facility views and operational monitoring — map-based, server-driven, and built for delivery & management teams.\",\n        highlights:[\n          \"Facility views, map-based locations and customized Google Maps markers\",\n          \"Server-driven details, APIs, barcode scanning and real-time notifications\",\n          \"Operational monitoring for delivery and management teams\"\n        ],\n        stack:[\"Flutter\",\"Dart\",\"Dio\",\"WebView\",\"Google Maps\"],\n        cols:\"1.1fr 1fr\", mediaOrder:\"2\", textOrder:\"1\"\n      }\n    ];\n\n    const timelineRaw = [\n      {\n        period:\"Q3 2025 · October 2025\", accent:\"#8B7CF6\", glow:\"rgba(139,124,246,.5)\",\n        title:\"The Agile Achiever Award\", org:\"Soft Suave Technologies Pvt. Ltd.\",\n        details:[\n          \"Awarded for outstanding and exemplary work and professional growth\",\n          \"Recognized for enthusiasm and consistent delivery excellence\"\n        ]\n      },\n      {\n        period:\"3+ Years\", accent:\"#4EA8FF\", glow:\"rgba(78,168,255,.5)\",\n        title:\"Executive Software Engineer / Flutter Developer\", org:\"Mobile app development · Android, iOS & cross-platform product teams\",\n        details:[\n          \"Built Android/iOS Flutter apps across customer-facing flows, operational workflows, API integrations, testing, release support and production improvements\",\n          \"Implemented Clean Architecture, reusable UI, dependency injection, Provider/Bloc/Cubit/Riverpod, GoRouter, Firebase, REST APIs, WebSockets, maps, payments, notifications, analytics and crash reporting\",\n          \"Improved performance, app size, responsiveness and UX while collaborating with QA, clients and stakeholders through Git workflows, sprints, UAT and store releases\",\n          \"Mentored junior developers via code reviews, applied TDD and CI/CD, and used AI-driven tools (Claude Code, MCP) to improve engineering velocity\"\n        ]\n      },\n      {\n        period:\"2019 — 2023\", accent:\"#67E8F9\", glow:\"rgba(103,232,249,.5)\",\n        title:\"B.E. — Computer Science & Engineering\", org:\"AVS Engineering College, Salem, Tamil Nadu\",\n        details:[\n          \"CGPA: 7.91\"\n        ]\n      }\n    ];\n    const timeline = timelineRaw.map((n,i) => ({\n      ...n,\n      isOpen: !!this.state.open[i],\n      rotate: this.state.open[i] ? \"45deg\" : \"0deg\",\n      onToggle: () => this.toggle(i)\n    }));\n\n    return { resumeUrl, projects, timeline };\n  }\n\n  componentDidMount(){\n    this._waitFor(() => window.THREE, () => this._initHero(), 60);\n    this._initCursor();\n    this._initReveal();\n    this._initSkills();\n    this._initNav();\n    this._waitFor(() => window.Lenis, () => this._initSmooth(), 40);\n  }\n\n  componentWillUnmount(){\n    if(this._raf) cancelAnimationFrame(this._raf);\n    if(this._sraf) cancelAnimationFrame(this._sraf);\n    if(this._lenis) this._lenis.destroy();\n    window.removeEventListener('mousemove', this._onMove);\n    window.removeEventListener('scroll', this._onScroll);\n  }\n\n  _waitFor(cond, cb, tries){\n    if(cond()){ cb(); return; }\n    if(tries <= 0) return;\n    setTimeout(() => this._waitFor(cond, cb, tries-1), 80);\n  }\n\n  /* ---------- CUSTOM CURSOR ---------- */\n  _initCursor(){\n    const dot = document.getElementById('cursor-dot');\n    const ring = document.getElementById('cursor-ring');\n    if(!dot || !ring) return;\n    let mx=innerWidth/2, my=innerHeight/2, rx=mx, ry=my;\n    this._onMove = e => { mx=e.clientX; my=e.clientY; dot.style.left=mx+'px'; dot.style.top=my+'px'; };\n    window.addEventListener('mousemove', this._onMove);\n    const loop = () => {\n      rx += (mx-rx)*0.18; ry += (my-ry)*0.18;\n      ring.style.left=rx+'px'; ring.style.top=ry+'px';\n      this._craf = requestAnimationFrame(loop);\n    };\n    loop();\n    document.addEventListener('mouseover', e => {\n      if(e.target.closest('[data-link],a,button,#skills-canvas')){\n        ring.style.width='54px'; ring.style.height='54px';\n        ring.style.borderColor='rgba(78,168,255,.6)';\n        ring.style.background='rgba(78,168,255,.08)';\n      } else {\n        ring.style.width='38px'; ring.style.height='38px';\n        ring.style.borderColor='rgba(237,238,242,.45)';\n        ring.style.background='transparent';\n      }\n    });\n  }\n\n  /* ---------- SMOOTH SCROLL ---------- */\n  _initSmooth(){\n    try{\n      this._lenis = new window.Lenis({ lerp:0.09, wheelMultiplier:1 });\n      const raf = t => { this._lenis.raf(t); this._lraf = requestAnimationFrame(raf); };\n      this._lraf = requestAnimationFrame(raf);\n      document.querySelectorAll('a[href^=\"#\"]').forEach(a => {\n        a.addEventListener('click', e => {\n          const id = a.getAttribute('href');\n          const el = document.querySelector(id);\n          if(el){ e.preventDefault(); this._lenis.scrollTo(el, { offset:-10, duration:1.4 }); }\n        });\n      });\n    }catch(e){}\n  }\n\n  /* ---------- SCROLL PROGRESS + NAV ---------- */\n  _initNav(){\n    const bar = document.getElementById('scroll-progress');\n    const links = [...document.querySelectorAll('[data-nav][data-link]')];\n    const sections = ['about','skills','work','timeline'].map(id => document.getElementById(id));\n    this._onScroll = () => {\n      const h = document.documentElement;\n      const p = h.scrollTop / (h.scrollHeight - h.clientHeight || 1);\n      if(bar) bar.style.width = (p*100)+'%';\n      let active = null;\n      sections.forEach(s => { if(s && s.getBoundingClientRect().top < innerHeight*0.4) active = s.id; });\n      links.forEach(l => {\n        const on = l.getAttribute('href') === '#'+active;\n        l.style.color = on ? '#EDEEF2' : '#9a9db0';\n      });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive:true });\n    this._onScroll();\n  }\n\n  /* ---------- SCROLL REVEAL ---------- */\n  _initReveal(){\n    const els = [...document.querySelectorAll('[data-reveal]')];\n    els.forEach(el => {\n      el.style.opacity='0';\n      el.style.transform='translateY(30px)';\n      el.style.transition='opacity 1s cubic-bezier(.22,1,.36,1),transform 1s cubic-bezier(.22,1,.36,1)';\n    });\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(en => {\n        if(en.isIntersecting){\n          en.target.style.opacity='1';\n          en.target.style.transform='translateY(0)';\n          io.unobserve(en.target);\n        }\n      });\n    }, { threshold:0.12 });\n    els.forEach(el => io.observe(el));\n\n    document.querySelectorAll('[data-hero]').forEach((el,i) => {\n      el.style.opacity='0'; el.style.transform='translateY(26px)';\n      el.style.transition='opacity 1s cubic-bezier(.22,1,.36,1),transform 1s cubic-bezier(.22,1,.36,1)';\n      setTimeout(() => { el.style.opacity='1'; el.style.transform='translateY(0)'; }, 260 + i*140);\n    });\n  }\n\n  /* ---------- HERO 3D ---------- */\n  _initHero(){\n    const canvas = document.getElementById('hero-canvas');\n    if(!canvas || !window.THREE) return;\n    const THREE = window.THREE;\n    const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });\n    renderer.setPixelRatio(Math.min(devicePixelRatio,2));\n    const scene = new THREE.Scene();\n    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);\n    camera.position.set(0,0,9);\n\n    const size = () => {\n      const r = canvas.getBoundingClientRect();\n      renderer.setSize(r.width, r.height, false);\n      camera.aspect = r.width/r.height; camera.updateProjectionMatrix();\n    };\n\n    // phone group\n    const phone = new THREE.Group();\n    const rounded = (w,h,r) => { const s=new THREE.Shape(); const x=-w/2,y=-h/2;\n      s.moveTo(x+r,y); s.lineTo(x+w-r,y); s.quadraticCurveTo(x+w,y,x+w,y+r);\n      s.lineTo(x+w,y+h-r); s.quadraticCurveTo(x+w,y+h,x+w-r,y+h);\n      s.lineTo(x+r,y+h); s.quadraticCurveTo(x,y+h,x,y+h-r);\n      s.lineTo(x,y+r); s.quadraticCurveTo(x,y,x+r,y); return s; };\n\n    const bodyGeo = new THREE.ExtrudeGeometry(rounded(2.5,5.1,0.42), { depth:0.28, bevelEnabled:true, bevelThickness:0.06, bevelSize:0.06, bevelSegments:4 });\n    bodyGeo.center();\n    const bodyMat = new THREE.MeshStandardMaterial({ color:0x0c0e14, metalness:0.9, roughness:0.28 });\n    const body = new THREE.Mesh(bodyGeo, bodyMat);\n    phone.add(body);\n\n    // screen texture (procedural app UI)\n    const tex = document.createElement('canvas'); tex.width=420; tex.height=880;\n    const g = tex.getContext('2d');\n    const grd = g.createLinearGradient(0,0,0,880);\n    grd.addColorStop(0,'#0a1020'); grd.addColorStop(1,'#0a0d16');\n    g.fillStyle=grd; g.fillRect(0,0,420,880);\n    // header\n    g.fillStyle='#4EA8FF'; g.beginPath(); g.arc(60,90,26,0,7); g.fill();\n    g.fillStyle='#EDEEF2'; g.font='600 26px sans-serif'; g.fillText('PerkyBot',100,84);\n    g.fillStyle='#4EFF9F'; g.font='500 15px sans-serif'; g.fillText('● online',100,110);\n    const bubble=(x,y,w,h,c)=>{ g.fillStyle=c; g.beginPath();\n      const r=18,X=x,Y=y; g.moveTo(X+r,Y); g.arcTo(X+w,Y,X+w,Y+h,r); g.arcTo(X+w,Y+h,X,Y+h,r); g.arcTo(X,Y+h,X,Y,r); g.arcTo(X,Y,X+w,Y,r); g.fill(); };\n    bubble(40,170,250,64,'#151b2b');\n    bubble(130,254,250,54,'rgba(78,168,255,.9)');\n    bubble(40,332,220,54,'#151b2b');\n    bubble(110,410,270,70,'rgba(139,124,246,.85)');\n    // chart card\n    bubble(40,510,340,210,'#0f1522');\n    g.strokeStyle='#4EA8FF'; g.lineWidth=3; g.beginPath();\n    const pts=[[70,680],[120,640],[170,655],[220,600],[270,615],[320,560],[360,575]];\n    pts.forEach((p,i)=> i?g.lineTo(p[0],p[1]):g.moveTo(p[0],p[1])); g.stroke();\n    g.fillStyle='#8B7CF6'; pts.forEach(p=>{g.beginPath();g.arc(p[0],p[1],4,0,7);g.fill();});\n    g.fillStyle='#6b6f7d'; g.font='500 15px sans-serif'; g.fillText('Weekly wellness',66,545);\n    // input bar\n    bubble(40,780,340,60,'#151b2b');\n    g.fillStyle='#4EA8FF'; g.beginPath(); g.arc(350,810,22,0,7); g.fill();\n    const screenTex = new THREE.CanvasTexture(tex);\n    const screenGeo = new THREE.PlaneGeometry(2.28, 4.9);\n    const screenMat = new THREE.MeshBasicMaterial({ map:screenTex });\n    const screen = new THREE.Mesh(screenGeo, screenMat);\n    screen.position.z = 0.19;\n    phone.add(screen);\n    phone.rotation.set(-0.05, 0.34, 0.05);\n    phone.scale.set(0.94,0.94,0.94);\n    phone.position.x = 2.0;\n    scene.add(phone);\n\n    // particles\n    const N = 900;\n    const pg = new THREE.BufferGeometry();\n    const pos = new Float32Array(N*3);\n    for(let i=0;i<N;i++){ pos[i*3]=(Math.random()-0.5)*26; pos[i*3+1]=(Math.random()-0.5)*18; pos[i*3+2]=(Math.random()-0.5)*14-3; }\n    pg.setAttribute('position', new THREE.BufferAttribute(pos,3));\n    const pm = new THREE.PointsMaterial({ color:0x8fb6ff, size:0.028, transparent:true, opacity:0.7 });\n    const points = new THREE.Points(pg, pm);\n    scene.add(points);\n\n    // lights\n    scene.add(new THREE.AmbientLight(0x334, 0.6));\n    const l1 = new THREE.PointLight(0x4EA8FF, 14, 40); l1.position.set(-4,4,6); scene.add(l1);\n    const l2 = new THREE.PointLight(0x8B7CF6, 12, 40); l2.position.set(5,-3,5); scene.add(l2);\n    const l3 = new THREE.DirectionalLight(0xffffff, 0.5); l3.position.set(0,5,8); scene.add(l3);\n\n    let tx=0, ty=0;\n    const onMove = e => { tx=(e.clientX/innerWidth-0.5); ty=(e.clientY/innerHeight-0.5); };\n    window.addEventListener('mousemove', onMove);\n    this._heroMove = onMove;\n\n    size(); window.addEventListener('resize', size); this._heroSize = size;\n    let t=0;\n    const render = () => {\n      t+=0.01;\n      phone.rotation.y = 0.34 + Math.sin(t*0.6)*0.13 + tx*0.45;\n      phone.rotation.x = -0.05 + Math.cos(t*0.5)*0.06 - ty*0.35;\n      phone.position.y = Math.sin(t*0.8)*0.14;\n      points.rotation.y = t*0.03;\n      points.rotation.x = t*0.01;\n      l1.position.x = -4 + tx*4; l1.position.y = 4 - ty*4;\n      l2.position.x = 5 + tx*3;\n      camera.position.x = tx*0.6; camera.position.y = -ty*0.4; camera.lookAt(0,0,0);\n      renderer.render(scene, camera);\n      this._raf = requestAnimationFrame(render);\n    };\n    render();\n  }\n\n  /* ---------- SKILLS CONSTELLATION ---------- */\n  _initSkills(){\n    const canvas = document.getElementById('skills-canvas');\n    const legend = document.getElementById('skills-legend');\n    if(!canvas) return;\n    const ctx = canvas.getContext('2d');\n    const groups = [\n      { name:'Mobile', color:'#4EA8FF', skills:['Flutter','Dart','Android','iOS','Kotlin','Java','Platform Channels'] },\n      { name:'Architecture', color:'#8B7CF6', skills:['Provider','Bloc','Cubit','Riverpod','GetIt','Clean Arch','SOLID','GoRouter'] },\n      { name:'APIs & Cloud', color:'#67E8F9', skills:['REST','WebSocket','Socket.io','Dio','Firebase','Firestore','FCM'] },\n      { name:'AI-Driven Dev', color:'#4EFF9F', skills:['Claude Code','MCP','Connectors','Plugins'] },\n      { name:'Testing', color:'#FFB84E', skills:['TDD','Unit Tests','Widget Tests','Code Reviews'] },\n      { name:'Integrations', color:'#FF7EB6', skills:['Google Maps','Push','Razorpay','Agora','OAuth','Analytics'] },\n      { name:'Tooling & Deploy', color:'#B0B4C0', skills:['Git','GitHub','Jira','CI/CD','Flavors','App Store','Play Store','UAT'] }\n    ];\n    let W, H, hubs=[], nodes=[], hovered=-1, mouse={x:-999,y:-999};\n\n    const build = () => {\n      const r = canvas.getBoundingClientRect();\n      W = r.width; H = r.height;\n      canvas.width = W*Math.min(devicePixelRatio,2);\n      canvas.height = H*Math.min(devicePixelRatio,2);\n      ctx.setTransform(Math.min(devicePixelRatio,2),0,0,Math.min(devicePixelRatio,2),0,0);\n      hubs=[]; nodes=[];\n      const cx=W/2, cy=H/2 - 24;\n      const R = Math.min(W,H)*0.30;\n      groups.forEach((grp,gi) => {\n        const ang = (gi/groups.length)*Math.PI*2 - Math.PI/2;\n        const hx = cx + Math.cos(ang)*R;\n        const hy = cy + Math.sin(ang)*R*0.82;\n        const hub = { x:hx, y:hy, bx:hx, by:hy, color:grp.color, label:grp.name, gi, hub:true, ph:Math.random()*7 };\n        hubs.push(hub);\n        grp.skills.forEach((sk,si) => {\n          const sa = ang + (si-(grp.skills.length-1)/2)*0.34;\n          const sr = 58 + (si%2)*20;\n          nodes.push({ x:hx+Math.cos(sa)*sr, y:hy+Math.sin(sa)*sr, bx:hx+Math.cos(sa)*sr, by:hy+Math.sin(sa)*sr, color:grp.color, label:sk, gi, hub:false, ph:Math.random()*7 });\n        });\n      });\n    };\n\n    const draw = (t) => {\n      ctx.clearRect(0,0,W,H);\n      // connections\n      nodes.forEach(n => {\n        const hub = hubs[n.gi];\n        const dim = hovered>=0 && hovered!==n.gi;\n        ctx.strokeStyle = n.color + (dim?'10':'33');\n        ctx.lineWidth = 1;\n        ctx.beginPath(); ctx.moveTo(hub.x,hub.y); ctx.lineTo(n.x,n.y); ctx.stroke();\n      });\n      // hub-to-hub faint ring\n      ctx.strokeStyle='rgba(255,255,255,.05)';\n      ctx.beginPath();\n      hubs.forEach((h,i)=> i?ctx.lineTo(h.x,h.y):ctx.moveTo(h.x,h.y));\n      ctx.closePath(); ctx.stroke();\n\n      const all = nodes.concat(hubs);\n      all.forEach(n => {\n        // float\n        n.x = n.bx + Math.sin(t*0.0009 + n.ph)*7;\n        n.y = n.by + Math.cos(t*0.0011 + n.ph)*7;\n        // mouse repel\n        const dx=n.x-mouse.x, dy=n.y-mouse.y, d=Math.hypot(dx,dy);\n        if(d<90){ const f=(90-d)/90*10; n.x+=dx/d*f; n.y+=dy/d*f; }\n        const dim = hovered>=0 && hovered!==n.gi;\n        const rad = n.hub ? 6 : 3.2;\n        // glow\n        ctx.beginPath();\n        const gr = ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.hub?26:14);\n        gr.addColorStop(0, n.color + (dim?'22':(n.hub?'cc':'88')));\n        gr.addColorStop(1, n.color+'00');\n        ctx.fillStyle=gr; ctx.arc(n.x,n.y,n.hub?26:14,0,7); ctx.fill();\n        ctx.beginPath(); ctx.fillStyle = dim? n.color+'55' : n.color; ctx.arc(n.x,n.y,rad,0,7); ctx.fill();\n        // labels\n        if(n.hub){\n          ctx.fillStyle = dim ? 'rgba(237,238,242,.4)' : '#EDEEF2';\n          ctx.font = '600 13px \"Space Grotesk\", sans-serif';\n          ctx.textAlign='center';\n          ctx.fillText(n.label, n.x, n.y-16);\n        } else if(hovered===n.gi){\n          ctx.fillStyle='rgba(237,238,242,.85)';\n          ctx.font='500 11px \"Manrope\", sans-serif';\n          ctx.textAlign='center';\n          ctx.fillText(n.label, n.x, n.y-9);\n        }\n      });\n      this._sraf = requestAnimationFrame(draw);\n    };\n\n    canvas.addEventListener('mousemove', e => {\n      const r = canvas.getBoundingClientRect();\n      mouse.x = e.clientX-r.left; mouse.y = e.clientY-r.top;\n      let best=-1, bd=60;\n      hubs.forEach(h => { const d=Math.hypot(h.x-mouse.x,h.y-mouse.y); if(d<bd){bd=d;best=h.gi;} });\n      nodes.forEach(n => { const d=Math.hypot(n.x-mouse.x,n.y-mouse.y); if(d<26){best=n.gi;} });\n      hovered = best;\n    });\n    canvas.addEventListener('mouseleave', () => { mouse.x=-999; mouse.y=-999; hovered=-1; });\n\n    // legend chips\n    if(legend){\n      legend.innerHTML='';\n      groups.forEach((grp) => {\n        const chip = document.createElement('span');\n        chip.style.cssText='display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);font-size:12px;color:#c9cbd6;cursor:pointer;transition:all .25s ease';\n        chip.innerHTML='<span style=\"width:8px;height:8px;border-radius:50%;background:'+grp.color+';box-shadow:0 0 8px '+grp.color+'\"><\u002Fspan>'+grp.name;\n        chip.addEventListener('mouseenter',()=>{ hovered=grp.gi; chip.style.borderColor=grp.color; });\n        chip.addEventListener('mouseleave',()=>{ hovered=-1; chip.style.borderColor='rgba(255,255,255,.1)'; });\n        legend.appendChild(chip);\n      });\n    }\n\n    build(); window.addEventListener('resize', build);\n    this._sraf = requestAnimationFrame(draw);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
